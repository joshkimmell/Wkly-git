<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#4d0057" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wkly" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- All Google Fonts in a single request to avoid render-blocking round-trips -->
    <link href="https://fonts.googleapis.com/css2?family=Buenard:wght@400;700&family=Inter:wght@400;500;600;700&family=Raleway:ital,wght@0,100..900;1,100..900&family=Zilla+Slab:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <title>Wkly — Turn your week into wins</title>
    <meta name="description" content="Wkly is your focused command center for weekly goals, daily tasks, and AI-powered progress summaries — designed around the rhythm that actually drives results." />
    <!-- Apply theme before React mounts to prevent flash of wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'theme-light') {
            document.documentElement.classList.remove('dark');
          } else {
            // default: dark
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
