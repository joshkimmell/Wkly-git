[dev]
  framework = "vite"
  targetPort = 5173
  port = 8888
  command = "npm run dev --prefix frontend"
  envFile = "frontend/.env.stripe"

[build]
  command = "npm install --prefix netlify/functions && npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "frontend/dist/assets/"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_SERVICE_ROLE_KEY,STRIPE_PRICE_MONTHLY,STRIPE_PRICE_YEARLY,STRIPE_PRICE_ONE_TIME"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"

# Fallback: apply CORS to the /api/* rewrite path too (Capacitor native builds
# that still reach this path before the interceptor can translate the URL).
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
